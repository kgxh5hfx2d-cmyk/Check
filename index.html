<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arbeitszeit App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f6ef7">

<style>
:root {
  --bg:#0f1117;
  --surface:#1a1d2e;
  --text:#e2e8f0;
  --accent:#4f6ef7;
}

body.light {
  --bg:#f5f7fb;
  --surface:#ffffff;
  --text:#1e293b;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header {
  padding:10px;
  background:var(--surface);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

main { padding:10px; }

input { padding:6px; margin:4px; }
</style>
</head>

<body>

<header>
  <div>📊 Arbeitszeit</div>
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button id="install-btn" style="display:none">📲 Installieren</button>
  </div>
</header>

<main>
  <h3>Zeiterfassung</h3>

  <input type="date" id="date">
  <input type="time" id="start">
  <input type="time" id="end">
  <input type="number" id="pause" placeholder="Pause (Min)">

  <br>
  <button onclick="addEntry()">Speichern</button>

  <h3>Einträge</h3>
  <div id="list"></div>
</main>

<script>
// ===== STORAGE =====
const KEY = 'app_v1';

let data = JSON.parse(localStorage.getItem(KEY)) || {
  entries: [],
  theme: 'dark'
};

function save() {
  localStorage.setItem(KEY, JSON.stringify(data));
}

// ===== THEME =====
function toggleTheme() {
  document.body.classList.toggle('light');
  data.theme = document.body.classList.contains('light') ? 'light' : 'dark';
  save();
}

if (data.theme === 'light') {
  document.body.classList.add('light');
}

// ===== ENTRIES =====
function addEntry() {
  const entry = {
    id: Date.now(),
    date: date.value,
    start: start.value,
    end: end.value,
    pause: pause.value
  };

  data.entries.push(entry);
  save();
  render();
}

function removeEntry(id) {
  data.entries = data.entries.filter(e => e.id !== id);
  save();
  render();
}

function calc(e) {
  if (!e.start || !e.end) return '-';
  const s = e.start.split(':');
  const en = e.end.split(':');
  let mins = (en[0]*60+ +en[1]) - (s[0]*60+ +s[1]) - (e.pause||0);
  return (mins/60).toFixed(2)+'h';
}

function render() {
  list.innerHTML = data.entries.map(e => `
    <div style="background:var(--surface);margin:5px;padding:10px;border-radius:6px">
      ${e.date} | ${e.start}-${e.end} | ${calc(e)}
      <button onclick="removeEntry(${e.id})">❌</button>
    </div>
  `).join('');
}

render();

// ===== INSTALL BUTTON =====
let deferredPrompt;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  install-btn.style.display = 'inline';
});

install-btn.onclick = async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  install-btn.style.display = 'none';
};

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
